# Flow-DPPO on FLUX.2-klein-base (LoRA), multi-reward.
# DPPO == Flow-GRPO but the PPO ratio-clip is replaced by a KL trust-region mask
# (kl_mask_threshold). Trains on GenEval2 prompts; advantage is driven by all four
# rewards (PickScore + CLIP + GenEval2 Soft-TIFA + HPSv2).

# Environment Configuration
launcher: "accelerate"  # Options: accelerate
config_file: config/deepspeed/deepspeed_zero2.yaml  # Path to distributed config file (optional)
num_processes: 8  # Number of processes to launch (overrides config file)
main_process_port: 29500
mixed_precision: "bf16"  # Options: no, fp16, bf16

# Data Configuration
data:
  datasets:
    - name: geneval2  # Training source; GenEval2 prompts carry vqa_list for Soft-TIFA
      dataset_dir: "dataset/GenEval2"  # Folder with train.jsonl / test.jsonl
      train: { weight: 1 }  # Training participation
      eval: {}  # Also evaluated (inherits shared `eval:` section)
    - name: pickscore  # Eval-only general-quality prompt set
      dataset_dir: "dataset/pickscore"
      eval: {}
  preprocessing_batch_size: 8  # Batch size for preprocessing
  dataloader_num_workers: 16  # Number of workers for DataLoader
  force_reprocess: false  # Force reprocessing of the dataset
  cache_dir: "~/.cache/flow_factory/datasets"  # Cache directory for preprocessed datasets
  sampler_type: "auto"  # Options: auto, distributed_k_repeat, group_contiguous

# Model Configuration
model:
  finetune_type: 'lora'  # Options: full, lora
  lora_rank: 64
  lora_alpha: 128
  target_modules: "default"  # Options: all, default, or list of module names
  model_name_or_path: "black-forest-labs/FLUX.2-klein-base-9B"  # Options: ...-4B, ...-9B
  model_type: "flux2-klein"
  resume_path: null  # Local path or HF repo id for previous checkpoint/lora adapter
  resume_type: null  # Options: lora, full, state. Null to auto-detect based on `finetune_type`

log:
  run_name: null  # Run name (auto: {model_type}_{finetune_type}_{trainer_type}_{timestamp})
  project: "Flow-Factory"  # Project name for logging
  logging_backend: "wandb"  # Options: wandb, swanlab, tensorboard, none
  save_dir: "saves/"  # Directory to save model checkpoints and logs
  save_freq: 40  # Save frequency in epochs (0 to disable)
  save_model_only: true  # Save only the model weights (not optimizer, scheduler, etc.)
  verbose: false  # Print detailed progress during training

# Training Configuration
train:
  max_epochs: 1000  # Maximum number of epochs to train
  # Trainer settings
  trainer_type: 'dppo'  # Options: 'grpo', 'grpo-guard', 'dppo', 'nft', 'awm'
  advantage_aggregation: 'gdpo'  # Options: 'sum', 'gdpo'
  # Advantage clipping
  adv_clip_range: 5.0  # Advantage clipping range
  # KL
  kl_type: 'x-based'  # KL-vs-reference penalty space. Options: 'x-based', 'v-based'
  kl_mask_type: 'x-based'  # DPPO trust-region mask space. Options: 'x-based', 'v-based'
  kl_beta: 1.0e-3  # KL(current || reference) penalty. 0 disables the ref term. Typical ~1e-2 (x) / ~1e-3 (v).
  kl_guidance_scale: 4.0  # CFG for the KL-vs-reference forward. Null uses training guidance_scale.
  kl_mask_threshold: 1.0e-6  # DPPO: zero-gradient samples whose per-step KL(current||old) >= this and push the wrong way.
  ref_param_device: 'cuda'  # Options: cpu, cuda

  # Sampling settings
  resolution: 512  # Can be int or [height, width]
  num_inference_steps: 14  # Number of timesteps
  guidance_scale: 1.0  # Guidance scale for sampling

  # Batch and sampling
  per_device_batch_size: 4  # Batch size per device
  group_size: 24  # Group size for GRPO/DPPO sampling
  global_std: true  # Use global std for advantage normalization
  unique_sample_num_per_epoch: 64  # Unique samples per epoch
  gradient_step_per_epoch: 2  # Gradient steps per epoch
  num_inner_epochs: 1  # Number of inner loop optimization epochs

  # Optimization
  learning_rate: 3.0e-4  # Initial learning rate
  adam_weight_decay: 1.0e-4  # AdamW weight decay
  adam_betas: [0.9, 0.999]  # AdamW betas
  adam_epsilon: 1.0e-8  # AdamW epsilon
  max_grad_norm: 1.0  # Max gradient norm for clipping

  # EMA
  ema_decay: 0.9  # EMA decay rate (0 to disable)
  ema_update_interval: 4  # EMA update interval (in epochs)
  ema_device: "cuda"  # Device to store EMA model (options: cpu, cuda)

  # Gradient checkpointing
  enable_gradient_checkpointing: false  # Enable gradient checkpointing to save memory with extra compute

  # Seed
  seed: 42  # Random seed

# Scheduler Configuration
scheduler:
  dynamics_type: "Flow-SDE"  # Options: Flow-SDE, Dance-SDE, CPS, ODE
  noise_level: 0.7  # Noise level for sampling
  num_sde_steps: 3  # Number of noise steps
  sde_steps: [0, 1, 2, 3, 4, 5]  # Custom noise window; noise steps randomly selected from this list
  seed: 42  # Scheduler seed (for noise step selection)

# Evaluation settings
eval:
  resolution: 512  # Evaluation resolution
  per_device_batch_size: 16  # Eval batch size
  guidance_scale: 4.0  # Guidance scale for eval sampling
  num_inference_steps: 40  # Number of eval timesteps
  eval_freq: 40  # Eval frequency in epochs (0 to disable)
  seed: 42  # Eval seed

# Reward Model Configuration (drive advantage; all on the geneval2 training source)
rewards:
  - name: pick_score
    reward_model: PickScore
    weight: 1
    batch_size: 256
    device: cuda
    dtype: bfloat16
  - name: clip_text_align
    reward_model: clip
    weight: 1
    batch_size: 256
    device: cuda
    dtype: bfloat16
    model_name_or_path: openai/clip-vit-large-patch14
  - name: geneval2
    reward_model: geneval2_soft_tifa
    weight: 1
    batch_size: 256
    data_path: dataset/GenEval2  # prompt -> vqa_list lookup (also delivered via metadata)
    aggregation: gm  # Options: am, gm
    dtype: bfloat16
  - name: hpsv2
    reward_model: hpsv2
    weight: 1
    batch_size: 256
    device: cuda
    dtype: bfloat16
    hps_version: v2.1

# Evaluation reward models. `applicable_datasets` omitted = the reward runs on
# every eval dataset; an explicit list restricts it (geneval2 Soft-TIFA needs
# vqa_list metadata, so it only runs on the geneval2 set).
eval_rewards:
  - name: geneval2
    reward_model: geneval2_soft_tifa
    batch_size: 256
    data_path: dataset/GenEval2
    aggregation: gm
    dtype: bfloat16
    applicable_datasets: [geneval2]
  - name: pick_score
    reward_model: PickScore
    batch_size: 256
    device: cuda
    dtype: bfloat16
  - name: clip_text_align
    reward_model: clip
    batch_size: 256
    device: cuda
    dtype: bfloat16
    model_name_or_path: openai/clip-vit-large-patch14
  - name: hpsv2
    reward_model: hpsv2
    batch_size: 256
    device: cuda
    dtype: bfloat16
    hps_version: v2.1
