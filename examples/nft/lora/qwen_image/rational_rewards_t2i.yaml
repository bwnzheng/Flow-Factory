# NFT LoRA — Qwen-Image (T2I) with Rational Rewards (`rational_rewards_t2i`).
# Requires: pip install openai
# 1) Start vLLM: see scripts/start_vllm_rational_reward.sh and guidance/rewards.md
# 2) Set api_base_url to http://<judge-host>:<port>/v1 and align vlm_model with --served-model-name
launcher: "accelerate"
config_file: config/accelerate_configs/multi_gpu.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "bf16"

# Data Configuration
data:
  datasets:
    - name: default  # Unique identifier (used in metrics, caching, reward routing)
      dataset_dir: "dataset/pickscore"  # Folder with train.jsonl / test.jsonl
      train:  # Training participation config
        weight: 1  # Mixing weight (integer); ratio with other sources determines batch allocation
        max_dataset_size: 10000  # Cap on number of training samples for this source
      eval: {}  # Eval participation (inherits shared `eval:` section settings)
  enable_preprocess: true
  preprocessing_batch_size: 8
  dataloader_num_workers: 16
  force_reprocess: false
  cache_dir: "~/.cache/flow_factory/datasets"
  sampler_type: "auto"

model:
  finetune_type: "lora"
  lora_rank: 64
  lora_alpha: 128
  target_modules: "default"
  model_name_or_path: "Qwen/Qwen-Image-2512"
  model_type: "qwen-image"
  resume_path: null # Local path or HF repo id (e.g. 'owner/repo[/subdir][@rev]') for previous checkpoint/lora adapter
  resume_type: null

log:
  run_name: null
  project: "Flow-Factory"
  logging_backend: "wandb"
  save_dir: "saves/"
  save_freq: 20
  save_model_only: true

train:
  trainer_type: "nft"
  advantage_aggregation: "gdpo"
  nft_beta: 1.0
  off_policy: true
  ema_decay_schedule: "piecewise_linear"
  flat_steps: 0
  ramp_rate: 0.001
  ema_decay: 0.5
  ema_update_interval: 1
  ema_device: "cuda"
  num_train_timesteps: 10
  time_sampling_strategy: "discrete"
  time_shift: 3.0
  timestep_range: 0.5
  kl_type: "v-based"
  kl_beta: 0
  ref_param_device: "cuda"
  clip_range: 1.0e-4
  adv_clip_range: 5.0
  resolution: 512
  condition_image_size: 512
  num_inference_steps: 30
  guidance_scale: 1.0
  per_device_batch_size: 1
  group_size: 16
  global_std: false
  unique_sample_num_per_epoch: 32
  gradient_step_per_epoch: 1
  learning_rate: 2.0e-4
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  enable_gradient_checkpointing: false
  seed: 42

scheduler:
  dynamics_type: "ODE"

eval:
  resolution: 512
  condition_image_size: 512
  per_device_batch_size: 1
  guidance_scale: 1.0
  num_inference_steps: 40
  eval_freq: 10
  seed: 42

rewards:
  - name: "rational_rewards_t2i"
    reward_model: "rational_rewards_t2i"
    batch_size: 8
    device: "cuda"
    dtype: bfloat16
    api_base_url: "http://127.0.0.1:8000/v1"
    api_key: "EMPTY"
    vlm_model: "RationalRewards-8B-T2I"
    max_concurrent: 8
    max_retries: 5
    timeout: 300
    temperature: 0.1
    max_tokens: 2048
    aspects:
      - text_faithfulness
      - physical_quality
      - text_rendering

eval_rewards:
  - name: "rational_rewards_t2i"
    reward_model: "rational_rewards_t2i"
    batch_size: 8
    device: "cuda"
    dtype: bfloat16
    api_base_url: "http://127.0.0.1:8000/v1"
    api_key: "EMPTY"
    vlm_model: "RationalRewards-8B-T2I"
    max_concurrent: 8
    max_retries: 5
    timeout: 300
    temperature: 0.1
    max_tokens: 2048
    aspects:
      - text_faithfulness
      - physical_quality
      - text_rendering
