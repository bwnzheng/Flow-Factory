# Environment Configuration
launcher: "accelerate"  # Options: accelerate
config_file: config/accelerate_configs/multi_gpu.yaml  # Path to distributed config file (optional)
num_processes: 8  # Number of processes to launch (overrides config file)
main_process_port: 29500
mixed_precision: "bf16"  # Options: no, fp16, bf16


log:
  run_name: null  # Run name (auto: {model_type}_{finetune_type}_{trainer_type}_{timestamp})
  project: "Flow-Factory"  # Project name for logging
  logging_backend: "wandb"  # Options: wandb, swanlab, tensorboard, none
  save_dir: "saves"  # Directory to save model checkpoints and logs
  save_freq: 20  # Save frequency in epochs (0 to disable)
  save_model_only: true  # Save only the model weights (not optimizer, scheduler, etc.)
  
# Data Configuration
data:
  datasets:
    - name: default  # Unique identifier (used in metrics, caching, reward routing)
      dataset_dir: "dataset/sharegpt4o_image_mini"  # Folder with train.jsonl / test.jsonl
      train:
        weight: 1  # Mixing weight (integer); ratio with other sources determines batch allocation
        max_dataset_size: 1024  # Cap on number of training samples for this source
      eval: {}  # Eval participation (inherits shared `eval:` section settings)
  preprocessing_batch_size: 8  # Batch size for preprocessing
  dataloader_num_workers: 16  # Number of workers for DataLoader
  force_reprocess: true  # Force reprocessing of the dataset
  cache_dir: "~/.cache/flow_factory/datasets" # Cache directory for preprocessed datasets

# Model Configuration
model:
  finetune_type: 'lora' # Options: full, lora
  lora_rank : 64
  lora_alpha : 128
  target_modules: "default" # Options: all, default, or list of module names like ["to_k", "to_q", "to_v", "to_out.0"]
  model_name_or_path: "ByteDance-Seed/BAGEL-7B-MoT"  # HuggingFace model ID or local path
  model_type: "bagel"  # Model adapter key; see src/flow_factory/models/registry.py for options
  resume_path: null # Path to load previous checkpoint/lora adapter
  resume_type: null # Options: lora, full, state. Null to auto-detect based on `finetune_type`
  attn_backend: 'flash' # Options: auto, flash, sdpa

# Training Configuration
train:
  # Trainer settings
  trainer_type: 'grpo' # Options: 'grpo', 'nft', 'awm'
  advantage_aggregation: 'gdpo' # Options: 'sum', 'gdpo'
  # Clipping
  clip_range: 1.0e-4  # PPO/GRPO clipping range
  adv_clip_range: 5.0  # Advantage clipping range
  # KL div
  kl_type: 'v-based' # Options: 'x-based', 'v-based'
  kl_beta: 0 # KL divergence coefficient. Set ~1e-2 for 'x-based' and ~1e-3 for 'v-based'.
  ref_param_device: 'cuda' # Options: cpu, cuda

  # Sampling settings
  resolution: 512  # Can be int or [height, width]
  num_inference_steps: 10  # Number of timesteps
  # Bagel-specific generation params (passed to inference/forward via **training_args)
  cfg_text_scale: 1.0
  cfg_img_scale: 1.0
  cfg_interval: [0.4, 1.0]
  cfg_renorm_min: 0.0
  cfg_renorm_type: global
 
  # Batch and sampling
  per_device_batch_size: 2  # Batch size per device (I2I uses NaViT-packed batching; subset-round packing for variable condition count)
  # Bagel is NOT batch-invariant: it uses NaViT-style sequence packing (all samples in a
  # batch are concatenated into one block-diagonal-attention sequence), so a sample's
  # linear-projection matmuls run over the whole pack's token length and its bf16 rounding
  # depends on the pack composition (which samples are packed together). Disabling the
  # optimize-time shuffle makes each training micro-batch pack the same samples as its
  # rollout pack, so forward() is bit-identical between rollout and training (on-policy
  # ratio == 1). Requires matched sampling/training per_device_batch_size.
  shuffle_samples: false
  group_size: 16  # Group size for GRPO sampling
  global_std: true  # Use global std for advantage normalization
  unique_sample_num_per_epoch: 48  # Unique samples per group
  gradient_step_per_epoch: 2  # Gradient steps per epoch. The first step is on-policy, the rest are off-policy.
  
  # Optimizer
  learning_rate: 1.0e-4  # Initial learning rate
  adam_weight_decay: 1.0e-4  # AdamW weight decay
  adam_betas: [0.9, 0.999]  # AdamW betas
  adam_epsilon: 1.0e-8  # AdamW epsilon
  max_grad_norm: 1.0  # Max gradient norm for clipping

  # EMA
  ema_decay: 0.9  # EMA decay rate (0 to disable)
  ema_update_interval: 4  # EMA update interval (in epochs)
  ema_device: "cuda"  # Device to store EMA model (options: cpu, cuda)

  # Gradient checkpointing
  enable_gradient_checkpointing: false  # Enable gradient checkpointing to save memory with extra compute

  # Seed
  seed: 42  # Random seed

# Scheduler Configuration
scheduler:
  dynamics_type: "CPS"  # Options: Flow-SDE, Dance-SDE, CPS, ODE
  shift: 3.0 # Shift for noise scheduling
  noise_level: 0.8  # Noise level for sampling
  num_sde_steps: 3  # Number of noise steps
  sde_steps: [0, 1, 2, 3, 4, 5]  # Custom noise window, noise steps are randomly selected from this list during training
  seed: 42  # Scheduler seed (for noise step selection)

# Evaluation settings
eval:
  resolution: 1024  # Evaluation resolution
  per_device_batch_size: 2  # Eval batch size
  num_inference_steps: 50  # Number of eval timesteps
  eval_freq: 20  # Eval frequency in epochs (0 to disable)
  seed: 42  # Eval seed (defaults to training seed)
  
  # Bagel-specific generation params (passed to inference/forward via **training_args)
  cfg_text_scale: 3.0
  cfg_img_scale: 1.5
  cfg_interval: [0.4, 1.0]
  cfg_renorm_min: 0.0
  cfg_renorm_type: global
  timestep_shift: 3.0

# Reward Model Configuration
rewards:
  - name: "pickscore"
    reward_model: "PickScore"
    weight: 1  # Weight of this reward model
    batch_size: 16
    device: "cuda"
    dtype: bfloat16

# Optional Evaluation Reward Models
eval_rewards:
  - name: "pickscore"
    reward_model: "PickScore"
    weight: 1  # Weight of this reward model
    batch_size: 32
    device: "cuda"
    dtype: bfloat16
