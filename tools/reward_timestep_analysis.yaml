# Reward Per-Timestep Analysis Configuration
# ===========================================
# Specify a checkpoint directory — all checkpoint-N subdirectories
# will be auto-discovered and analyzed in parallel across GPUs.

# --- Model ---
model:
  base_model: "stabilityai/stable-diffusion-3.5-medium"
  # Directory containing checkpoint-N subdirectories
  checkpoint_dir: "saves/sd3-5_lora_nft_20260601_115058/checkpoints/"
  dtype: "bfloat16"
  num_gpus: 1                # Number of GPUs to use in parallel

# --- Inference ---
inference:
  num_inference_steps: 50
  per_device_batch_size: 4   # Batch multiple prompts per trajectory run
  guidance_scale: 1.0
  height: 512
  width: 512
  seed: 42

# --- Analysis ---
analysis:
  max_epochs: 220            # Only checkpoints with epoch <= max_epochs
  max_prompts: 5
  num_analysis_timesteps: 20
  # prompts_file: load prompts from a text file (one per line).
  # When set, the inline `prompts` list below is ignored.
  prompts_file: "dataset/pickscore/test.txt"
  prompts: []

# --- Rewards ---
rewards:
  - name: "clip_score"
    reward_model: "CLIP"
  - name: "pick_score"
    reward_model: "PickScore"

# --- Output ---
output:
  dir: "analysis_output"
