# Reward Per-Timestep Analysis Configuration
# ===========================================
# Specify a checkpoint directory — all checkpoint-N subdirectories
# will be auto-discovered and analyzed in parallel across GPUs.

# --- Model ---
model:
  base_model: "stabilityai/stable-diffusion-3.5-medium"
  # Directory containing checkpoint-N subdirectories
  checkpoint_dir: "saves/sd3-5_lora_nft_20260601_115058/checkpoints/"
  dtype: "bfloat16"
  num_gpus: 1                # Number of GPUs to use in parallel

# --- Inference ---
inference:
  num_inference_steps: 50
  guidance_scale: 1.0
  height: 512
  width: 512
  seed: 42

# --- Analysis ---
analysis:
  num_analysis_timesteps: 20
  prompts:
    - "A majestic dragon soaring above a futuristic city at sunset"
    - "A tranquil Japanese garden with cherry blossoms and a koi pond"
    - "An astronaut riding a horse on Mars during a dust storm"
    - "A steampunk airship floating above Victorian-era London"
    - "A close-up portrait of a wise old wizard with intricate robes"

# --- Rewards ---
rewards:
  - name: "clip_score"
    reward_model: "CLIP"
  - name: "pick_score"
    reward_model: "PickScore"

# --- Output ---
output:
  dir: "analysis_output"
