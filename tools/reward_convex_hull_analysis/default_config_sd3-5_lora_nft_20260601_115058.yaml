# Reward Convex Hull Analysis Configuration
#
# Extracts rollout images from TensorBoard events and/or generates images from
# checkpoints, scores them with reward models, and plots convex hulls in reward
# space to visualize how the reward landscape evolves during training.

# ---- Run identity ----
run_name: "sd3-5_lora_nft_20260601_115058"                       # Auto-resolved from checkpoint_dir if empty
save_dir: "saves"                  # Parent of saves/tensorboard/ and saves/{run_name}/

# ---- Data sources ----
tensorboard:
  enabled: true
  # Path auto-resolved to {save_dir}/tensorboard/{run_name}/
  max_images_per_step: 0          # 0 = all; set to N to cap per-step images
  datasets: ["train"]                    # [] = all; ["eval"] or ["train"] to filter
  num_workers: 16                  # Parallel PNG decode workers

checkpoint:
  enabled: true
  checkpoint_dir: ""               # Auto-resolved to {save_dir}/{run_name}/checkpoints/
  prompts_file: "dataset/pickscore/test.txt"                 # One prompt per line (e.g. dataset/pickscore/test.txt)
  prompts: []                      # Inline prompts (used if prompts_file is empty)
  max_prompts: 10
  num_samples: 4                   # Images generated per prompt per checkpoint
  gen_kwargs:
    num_inference_steps: 50
    guidance_scale: 1.0
    height: 512
    width: 512
    seed: 42

# ---- Model ----
model:
  base_model: "stabilityai/stable-diffusion-3.5-medium"
  dtype: "bfloat16"
  device: "cuda"                   # "cuda" or "cpu"

# ---- Reward models (2+ models recommended for meaningful convex hulls) ----
rewards:
  - name: "clip_score"
    reward_model: "CLIP"
  - name: "pick_score"
    reward_model: "PickScore"

# ---- Output ----
output:
  dir: "analysis_output"
